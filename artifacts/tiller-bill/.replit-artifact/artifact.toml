kind = "mobile"
previewPath = "/tiller-bill/"
title = "Tiller Bill"
version = "1.0.0"
id = "artifacts/tiller-bill"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/tiller-bill/" ]
localPort = 20301

[services.development]
run = "pnpm --filter @workspace/tiller-bill run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tiller-bill", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/tiller-bill", "run", "serve" ]

[services.env]
PORT = "20301"
BASE_PATH = "/tiller-bill/"
